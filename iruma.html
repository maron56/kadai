<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入間航空祭 - Sky Flight Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f0f8ff;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #007bff;
            margin-bottom: 30px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery img {
            width: 100%;
            aspect-ratio: 3 / 2;
            object-fit: cover;
            border: 2px solid #ccc;
            border-radius: 8px;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        a {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background: #0056b3;
        }

        /* モーダルスタイル */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            align-items: flex-start;
            justify-content: center;
            padding-top: 20px;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            animation: zoom 0.3s;
        }

        @keyframes zoom {
            from {
                transform: scale(0)
            }

            to {
                transform: scale(1)
            }
        }

        .close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        .close:hover,
        .close:focus {
            color: #bbb;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <h1>入間航空祭</h1>
    <div class="gallery">
        <img src="img/imgI_10.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_12.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_13.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_14.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_15.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_16.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_17.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_18.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_19.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_20.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_22.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_23.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_24.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_25.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_26.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
        <img src="img/imgI_27.JPG" alt="入間航空祭の写真" onclick="openModal(this)">
    </div>

    <!-- モーダル -->
    <div id="myModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

    <br>
    <a href="index.html" onclick="history.back(); return false;">元のページへ戻る</a>

    <script>
        function openModal(img) {
            var modal = document.getElementById("myModal");
            var modalImg = document.getElementById("modalImg");
            modal.style.display = "block";
            modalImg.src = img.src;
        }

        function closeModal() {
            var modal = document.getElementById("myModal");
            modal.style.display = "none";
        }

        // ESCキーで閉じる
        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        // モーダル外クリックで閉じる
        window.onclick = function (event) {
            var modal = document.getElementById("myModal");
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>

</html>
