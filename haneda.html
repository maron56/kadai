<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽田空港 - Sky Flight Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            text-align: center;
            background: #f0f8ff;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #007bff;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .hnd-title {
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 0.5em;
            display: block;
            font-size: 3.5rem;
            line-height: 1;
        }

        .hnd-sub {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            color: #555;
            display: block;
            margin-top: 5px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }

            .hnd-title {
                font-size: 2.5rem;
            }
        }

        .gallery img {
            width: 100%;
            aspect-ratio: 3 / 2;
            object-fit: cover;
            border: 2px solid #ccc;
            border-radius: 8px;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        a {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background: #0056b3;
        }

        /* モーダルスタイル */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            align-items: flex-start;
            justify-content: center;
            padding-top: 20px;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            animation: zoom 0.3s;
        }

        @keyframes zoom {
            from {
                transform: scale(0)
            }

            to {
                transform: scale(1)
            }
        }

        .close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        .close:hover,
        .close:focus {
            color: #bbb;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <h1>
        <span class="hnd-title">Ｈ Ｎ Ｄ</span>
        <small class="hnd-sub">TOKYO HANEDA AIRPORT</small>
    </h1>
    <div class="gallery">
        <img src="img/imgH01.JPG" alt="羽田空港の写真" onclick="openModal(this)">
        <img src="img/imgH02.JPG" alt="羽田空港の写真" onclick="openModal(this)">
        <img src="img/imgH03.JPG" alt="羽田空港の写真" onclick="openModal(this)">
        <img src="img/imgH04.JPG" alt="羽田空港の写真" onclick="openModal(this)">
        <img src="img/imgH06.JPG" alt="羽田空港の写真" onclick="openModal(this)">
        <img src="img/imgH07.JPG" alt="羽田空港の写真" onclick="openModal(this)">
        <img src="img/imgH27.JPG" alt="羽田空港の写真" onclick="openModal(this)">
    </div>

    <!-- モーダル -->
    <div id="myModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

    <br>
    <a href="index.html" onclick="history.back(); return false;">元のページへ戻る</a>

    <script>
        function openModal(img) {
            var modal = document.getElementById("myModal");
            var modalImg = document.getElementById("modalImg");
            modal.style.display = "block";
            modalImg.src = img.src;
        }

        function closeModal() {
            var modal = document.getElementById("myModal");
            modal.style.display = "none";
        }

        // ESCキーで閉じる
        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        // モーダル外クリックで閉じる
        window.onclick = function (event) {
            var modal = document.getElementById("myModal");
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>

</html>
